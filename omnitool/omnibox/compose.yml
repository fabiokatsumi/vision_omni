services:
  windows:
    image: windows-local
    container_name: omni-windows
    privileged: true
    environment:
      RAM_SIZE: "8G"
      CPU_CORES: "4"
      DISK_SIZE: "20G"
      USER_PORTS: "5006"
      KVM: "N"
      VERSION: "win11e"
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006                 # Web Viewer access
      - 5006:5006                 # Windows VM Flask API
    volumes:
      - ./vm/win11setup/firstboot:/oem
      - ./vm/win11setup/setupscripts:/data
      - ./vm/win11storage:/storage
    